{% extends "layout.html" %} {% block content %}
<h1>Manage Users</h1>

<h2>User Directory</h2>
<table border="1" cellpadding="5">
  <tr>
    <th>Email</th>
    <th>Name</th>
    <th>Status</th>
    <th>Password</th>
  </tr>
  {% for email, data in users.items() %}
  <tr>
    <td>{{ email }}</td>
    <td>{{ data.name }}</td>
    <td>{{ data.status }}</td>
    <td>{{ data.password }}</td>
  </tr>
  {% endfor %}
</table>

<hr />

<h2>Create New User</h2>
<form action="/create-user" method="POST">
  <label for="name">Full Name:</label>
  <input type="text" id="name" name="name" required /><br /><br />

  <label for="new_email">Email Address:</label>
  <input type="email" id="new_email" name="email" required /><br /><br />

  <label for="new_password">Temporary Password:</label>
  <input type="text" id="new_password" name="password" required /><br /><br />

  <button type="submit">Create User Account</button>
</form>

<hr />

<h2>Reset User Password</h2>
<form action="/reset-password" method="POST">
  <label for="reset_email">User Email:</label>
  <input type="email" id="reset_email" name="email" required /><br /><br />

  <label for="reset_password">New Password:</label>
  <input
    type="text"
    id="reset_password"
    name="new_password"
    required
  /><br /><br />

  <button type="submit">Reset Password</button>
</form>
{% endblock %}
